<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resy Booking Bot</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #333;
    }
    
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    
    .status.connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .info {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    .info p {
      margin: 8px 0;
    }
    
    .info strong {
      color: #333;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🍽️ Resy Booking Bot</h1>
  
  <div id="status" class="status disconnected">
    ⏳ Connecting to backend...
  </div>
  
  <div class="info">
    <p><strong>Status:</strong> Extension is active and ready to handle booking requests from your backend.</p>
    <p><strong>Note:</strong> Make sure you're logged into Resy in this browser for bookings to work.</p>
    <p><strong>Backend:</strong> localhost:3001</p>
  </div>
  
  <div class="footer">
    v1.0.0
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
